name: Build and Push RunPod Image

on:
  push:
    branches: [ "main" ]  # 当代码推送到 main 分支时触发
  workflow_dispatch:      # 允许你在 GitHub 页面手动点击运行

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        # 这个插件能让 GitHub 构建出兼容 RunPod (linux/amd64) 的镜像

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: seaseeker/translategemma-serverless:latest
          platforms: linux/amd64  # 强制指定架构
          cache-from: type=gha    # 使用 GitHub Actions 缓存加速后续构建
          cache-to: type=gha,mode=max
